name: waslaq_app
description: WaslaQ - Palestinian Social Marketplace
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Navigation
  auto_route: ^9.2.2

  # Network
  dio: ^5.7.0

  # Local storage
  flutter_secure_storage: ^9.2.2
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Localization
  slang: ^3.31.0
  slang_flutter: ^3.31.0

  # Images
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  flutter_svg: ^2.0.10+1

  # Display: opt into 90/120Hz where the panel supports it (Android)
  flutter_displaymode: ^0.6.0

  # Realtime messaging
  stream_chat_flutter: ^8.0.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3
  flutter_local_notifications: ^17.2.4

  # Payments
  flutter_stripe: ^10.1.0

  # UI
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.6
  flutter_native_splash: ^2.4.1

  # Utils
  intl: ^0.20.2
  path_provider: ^2.1.4
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  google_sign_in: ^6.2.2
  image_picker: ^1.1.2
  file_picker: ^8.3.7
  share_plus: ^10.1.4

  permission_handler: ^11.3.1
  local_auth: ^2.3.0
  package_info_plus: ^8.0.0
  in_app_review: ^2.0.9
  url_launcher: ^6.3.0
  connectivity_plus: ^6.1.0
  qr_flutter: ^4.1.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: 2.3.9
  auto_route_generator: ">=9.0.0 <9.3.0"
  isar_generator: ^3.1.0+1
  slang_build_runner: ^3.31.0
  freezed: ^2.4.4
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/google_logo.svg
    - assets/images/logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter_native_splash:
  color: "#000000"
  image: "assets/images/logo.png"
  android_12:
    color: "#000000"
    image: "assets/images/logo.png"

dependency_overrides:
  analyzer: 6.3.0
  dart_style: 2.3.6
  source_gen: 1.5.0
  analyzer_plugin: 0.11.3
  custom_lint_core: 0.6.0
  riverpod_analyzer_utils: 0.5.1
  freezed: 2.4.4
  image_gallery_saver_plus: ^4.0.1
