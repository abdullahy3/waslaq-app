version: 2
updates:
  # Flutter / Dart packages — weekly, minor+patch grouped, majors individual.
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Wait 7 days before proposing a newly published version — a freshly
    # published package can be a compromised/malicious release.
    cooldown:
      default-days: 7
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
